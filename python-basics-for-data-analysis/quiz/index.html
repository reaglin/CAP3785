  <script>
  var QUIZ_DATA = {"ModuleFolderName":"Python_Basics_for","CourseName":"CAP3785 - Data Analytics and Visualization","LastModified":"2026-07-03T14:27:20.5108738-04:00","NextQuestionNumber":21,"Questions":[{"Id":"TEMP_001","Type":"MC","Title":"Recommended Python Version to Install","QuestionText":"Which version of Python is recommended when setting up an analytics environment?","Hint":"Think about which version is still actively supported.","Feedback":"Python 3.x is recommended because Python 2 is no longer supported. The official installer is available at python.org.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108338-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Python 3.x","OptionFeedback":"Correct! Python 3.x is the recommended version as Python 2 is no longer supported."},{"Weight":0,"Text":"Python 2.x","OptionFeedback":"Incorrect. Python 2 is no longer supported and should not be used for new projects."},{"Weight":0,"Text":"Python 1.x","OptionFeedback":"Incorrect. Python 1.x is an outdated version not suitable for modern analytics."},{"Weight":0,"Text":"Any version works equally well","OptionFeedback":"Incorrect. The module specifically recommends Python 3.x due to the end of support for Python 2."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"Python\u0027s Package Manager Tool","QuestionText":"Which tool is Python\u0027s built-in package manager used to install analytics libraries?","Hint":"Its name is a short three-letter word.","Feedback":"pip is Python\u0027s package manager, allowing you to quickly install libraries such as pandas, NumPy, and Matplotlib.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108359-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"pip","OptionFeedback":"Correct! pip is Python\u0027s package manager used to install analytics libraries."},{"Weight":0,"Text":"npm","OptionFeedback":"Incorrect. npm is a package manager for Node.js, not Python."},{"Weight":0,"Text":"conda","OptionFeedback":"Incorrect. While conda is a popular package manager, the module specifically references pip."},{"Weight":0,"Text":"brew","OptionFeedback":"Incorrect. brew is a package manager for macOS software, not Python libraries."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"Purpose of Virtual Environments","QuestionText":"What is the primary purpose of using virtual environments in Python development?","Hint":"Think about what happens when two projects need different versions of the same library.","Feedback":"Virtual environments create isolated Python environments for different projects, preventing dependency conflicts between projects.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108366-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To create isolated environments that prevent dependency conflicts between projects","OptionFeedback":"Correct! Virtual environments isolate project dependencies, avoiding conflicts."},{"Weight":0,"Text":"To speed up Python script execution","OptionFeedback":"Incorrect. Virtual environments are about isolation, not execution speed."},{"Weight":0,"Text":"To automatically install the latest Python version","OptionFeedback":"Incorrect. Virtual environments do not manage Python version installation."},{"Weight":0,"Text":"To provide a graphical interface for running scripts","OptionFeedback":"Incorrect. Virtual environments are command-line tools for dependency isolation, not GUIs."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Jupyter Notebook\u0027s Key Characteristic","QuestionText":"Which of the following best describes a key feature of Jupyter Notebook?","Hint":"Think about what makes Jupyter unique compared to a regular code editor.","Feedback":"Jupyter Notebooks combine code, output, and narrative text in a single document, making them excellent for exploratory data analysis and sharing results.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108372-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It combines code, output, and narrative text in a single browser-based document","OptionFeedback":"Correct! This is the defining feature of Jupyter Notebook."},{"Weight":0,"Text":"It is a command-line tool for executing Python scripts in batch mode","OptionFeedback":"Incorrect. Jupyter Notebook is browser-based and interactive, not a command-line batch tool."},{"Weight":0,"Text":"It is exclusively used for building web applications","OptionFeedback":"Incorrect. Jupyter Notebook is designed for interactive data analysis workflows, not web applications."},{"Weight":0,"Text":"It replaces the need for any other Python installation","OptionFeedback":"Incorrect. Jupyter Notebook requires Python to be installed and is a tool built on top of it."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"Core Library for Data Manipulation","QuestionText":"Which Python library is specifically identified in the module for data manipulation?","Hint":"This library\u0027s name is also a term for a large, black-and-white bear.","Feedback":"pandas is the core library for data manipulation in Python analytics, installable via pip.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108379-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"pandas","OptionFeedback":"Correct! pandas is the library designated for data manipulation."},{"Weight":0,"Text":"NumPy","OptionFeedback":"Incorrect. NumPy is for numerical computing, not general data manipulation."},{"Weight":0,"Text":"Matplotlib","OptionFeedback":"Incorrect. Matplotlib is used for data visualization."},{"Weight":0,"Text":"Jupyter","OptionFeedback":"Incorrect. Jupyter is an interactive notebook environment, not a data manipulation library."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_006","Type":"MC","Title":"Python Data Type for Decimal Values","QuestionText":"Which Python numeric data type is used when precision with decimal values is required?","Hint":"Think about storing a temperature like 98.6.","Feedback":"Floats are used when precision with decimal values is required, such as calculating averages or percentages. Integers store whole numbers.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108394-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Float","OptionFeedback":"Correct! Floats handle decimal values like 98.6."},{"Weight":0,"Text":"Integer","OptionFeedback":"Incorrect. Integers store whole numbers without decimal points."},{"Weight":0,"Text":"String","OptionFeedback":"Incorrect. Strings represent textual data, not numeric decimal values."},{"Weight":0,"Text":"Tuple","OptionFeedback":"Incorrect. Tuples are ordered, immutable sequences, not a numeric type."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_007","Type":"MC","Title":"Characteristic That Distinguishes Tuples from Lists","QuestionText":"What key characteristic distinguishes tuples from lists in Python?","Hint":"Think about whether you can change the elements after creation.","Feedback":"Tuples are immutable, meaning their elements cannot be changed after creation, whereas lists are mutable and can be modified.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.51084-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Tuples are immutable; their elements cannot be changed after creation","OptionFeedback":"Correct! Immutability is the defining difference between tuples and lists."},{"Weight":0,"Text":"Tuples can only store numeric data types","OptionFeedback":"Incorrect. Tuples can store any data type, just like lists."},{"Weight":0,"Text":"Tuples are unordered collections","OptionFeedback":"Incorrect. Tuples are ordered sequences, similar to lists."},{"Weight":0,"Text":"Tuples use curly braces instead of parentheses","OptionFeedback":"Incorrect. Tuples use parentheses; curly braces are used for dictionaries and sets."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_008","Type":"MC","Title":"Data Structure for Key-Value Storage","QuestionText":"Which Python data structure stores data as key-value pairs, enabling fast lookups?","Hint":"Think about the structure used to represent a single row of tabular data with labeled fields.","Feedback":"Dictionaries store data as key-value pairs and are commonly used to represent structured records and mappings in analytics.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108405-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Dictionary","OptionFeedback":"Correct! Dictionaries store key-value pairs and enable fast lookups."},{"Weight":0,"Text":"List","OptionFeedback":"Incorrect. Lists store ordered sequences, not key-value pairs."},{"Weight":0,"Text":"Tuple","OptionFeedback":"Incorrect. Tuples are ordered, immutable sequences, not key-value stores."},{"Weight":0,"Text":"String","OptionFeedback":"Incorrect. Strings represent textual data, not key-value pairs."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_009","Type":"MC","Title":"String Method Used in Data Cleaning","QuestionText":"Which of the following string methods is mentioned in the module as commonly used in data cleaning tasks?","Hint":"Think about methods that remove whitespace or change letter case.","Feedback":"The module mentions .strip(), .lower(), and .split() as string methods heavily used in data cleaning tasks.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.510841-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":".strip()","OptionFeedback":"Correct! .strip() is one of the string methods highlighted for data cleaning."},{"Weight":0,"Text":".append()","OptionFeedback":"Incorrect. .append() is a list method, not a string method."},{"Weight":0,"Text":".keys()","OptionFeedback":"Incorrect. .keys() is a dictionary method, not a string method."},{"Weight":0,"Text":".sort()","OptionFeedback":"Incorrect. .sort() is a list method used to order elements, not a string cleaning method."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_010","Type":"MC","Title":"Purpose of the break Statement in Loops","QuestionText":"In the context of data analysis, what is the break statement typically used for within a loop?","Hint":"Think about what you would do once you have already found the record you were searching for.","Feedback":"The break statement is used to stop scanning once a target record is found, avoiding unnecessary further iterations.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108419-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To stop the loop once a target record has been found","OptionFeedback":"Correct! break exits the loop immediately when the desired condition is met."},{"Weight":0,"Text":"To skip rows that fail a quality check","OptionFeedback":"Incorrect. Skipping rows is the role of the continue statement, not break."},{"Weight":0,"Text":"To do nothing and act as a placeholder","OptionFeedback":"Incorrect. That is the role of the pass statement."},{"Weight":0,"Text":"To restart the loop from the beginning","OptionFeedback":"Incorrect. Python does not have a built-in restart statement; break exits the loop entirely."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_011","Type":"MC","Title":"Keyword Used to Define a Function","QuestionText":"Which Python keyword is used to define a function?","Hint":"It is a three-letter keyword that starts a function definition.","Feedback":"Functions in Python are defined using the def keyword, followed by the function name, parentheses, and a colon.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108425-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"def","OptionFeedback":"Correct! def is the keyword used to define a Python function."},{"Weight":0,"Text":"func","OptionFeedback":"Incorrect. func is not a Python keyword; Python uses def."},{"Weight":0,"Text":"function","OptionFeedback":"Incorrect. function is not used in Python; that syntax belongs to JavaScript."},{"Weight":0,"Text":"return","OptionFeedback":"Incorrect. return sends a value back from a function but does not define one."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_012","Type":"MC","Title":"Role of the return Statement","QuestionText":"What does the return statement do in a Python function?","Hint":"Think about how a function makes its result available to the rest of the script.","Feedback":"The return statement sends a value back to the caller, making the function\u0027s output available for further use in the script.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.510843-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It sends a value back to the caller so it can be used further in the script","OptionFeedback":"Correct! return makes the function\u0027s output accessible outside the function."},{"Weight":0,"Text":"It prints the result to the console","OptionFeedback":"Incorrect. Printing to the console is done with print(), not return."},{"Weight":0,"Text":"It terminates the entire Python program","OptionFeedback":"Incorrect. return exits only the current function, not the entire program."},{"Weight":0,"Text":"It defines a new variable inside the function","OptionFeedback":"Incorrect. Variable definition and returning a value are separate operations."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_013","Type":"MC","Title":"What a Docstring Documents","QuestionText":"What is the purpose of a docstring placed inside a Python function?","Hint":"Think about what information a developer needs when they encounter an unfamiliar function.","Feedback":"A docstring describes a function\u0027s purpose, parameters, and return value, and is accessible via the help() function.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108434-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To describe the function\u0027s purpose, parameters, and return value","OptionFeedback":"Correct! Docstrings document what a function does and how to use it."},{"Weight":0,"Text":"To execute code before the function runs","OptionFeedback":"Incorrect. Docstrings are string literals for documentation, not executable setup code."},{"Weight":0,"Text":"To define default values for function parameters","OptionFeedback":"Incorrect. Default parameter values are defined in the function signature, not in docstrings."},{"Weight":0,"Text":"To prevent the function from being called outside its module","OptionFeedback":"Incorrect. Docstrings do not restrict access; they provide documentation."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_014","Type":"MC","Title":"Recommended Way to Close a File","QuestionText":"What is the recommended best practice for closing a file in Python analytics workflows?","Hint":"Think about the approach that automatically handles closing even if an error occurs.","Feedback":"Using a with statement (context manager) automatically closes the file after the block executes, which is the recommended best practice.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108439-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Use a with statement so the file closes automatically","OptionFeedback":"Correct! The with block ensures the file is closed automatically, even if an error occurs."},{"Weight":0,"Text":"Call file.delete() after reading","OptionFeedback":"Incorrect. file.delete() is not a standard Python file method; files are closed, not deleted after reading."},{"Weight":0,"Text":"Leave the file open so it can be reused later","OptionFeedback":"Incorrect. Leaving files open can cause resource leaks and data integrity issues."},{"Weight":0,"Text":"Use os.close() immediately after opening","OptionFeedback":"Incorrect. os.close() operates on file descriptors, not file objects, and is not the recommended pattern."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_015","Type":"MC","Title":"Effect of Opening a File in \u0027w\u0027 Mode","QuestionText":"What happens to existing file content when you open a file in Python using \u0027w\u0027 mode?","Hint":"Think about whether your previous data is safe when using write mode.","Feedback":"Opening a file in \u0027w\u0027 mode overwrites all existing content. Use \u0027a\u0027 mode to append data without deleting existing content.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108445-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The existing content is overwritten","OptionFeedback":"Correct! \u0027w\u0027 mode overwrites existing file content."},{"Weight":0,"Text":"The new data is appended after the existing content","OptionFeedback":"Incorrect. Appending is done with \u0027a\u0027 mode, not \u0027w\u0027 mode."},{"Weight":0,"Text":"The file is opened as read-only","OptionFeedback":"Incorrect. Read-only mode is \u0027r\u0027, not \u0027w\u0027."},{"Weight":0,"Text":"Python raises an error if the file already exists","OptionFeedback":"Incorrect. Python silently overwrites the file when using \u0027w\u0027 mode."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_016","Type":"MC","Title":"CSV Module Advantage Over Text Splitting","QuestionText":"Why is Python\u0027s csv module preferred over plain text splitting when reading CSV files?","Hint":"Think about what happens when a data field itself contains a comma.","Feedback":"The csv module handles edge cases such as fields containing commas or quotes, which plain text splitting cannot manage reliably.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108452-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It correctly handles fields containing commas or quotes","OptionFeedback":"Correct! The csv module manages these edge cases that plain splitting misses."},{"Weight":0,"Text":"It automatically converts all data to integers","OptionFeedback":"Incorrect. The csv module reads data as strings by default; type conversion is still manual."},{"Weight":0,"Text":"It runs faster than any other file reading method","OptionFeedback":"Incorrect. Speed is not cited as the reason; reliability with complex fields is."},{"Weight":0,"Text":"It eliminates the need to open the file with open()","OptionFeedback":"Incorrect. You still use open() to open the file before passing it to the csv reader."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_017","Type":"MC","Title":"Common Error When Reading CSV Numeric Data","QuestionText":"What is a common error when performing arithmetic on data read from a CSV file in Python?","Hint":"Consider what data type Python uses by default when it reads values from a CSV.","Feedback":"Data read from CSV files arrives as strings by default. Forgetting to convert numeric columns using int() or float() is a common source of calculation errors.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108457-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Numeric values are read as strings and must be converted before arithmetic","OptionFeedback":"Correct! CSV data comes in as strings; explicit conversion is necessary for calculations."},{"Weight":0,"Text":"CSV files cannot store numbers, only text labels","OptionFeedback":"Incorrect. CSV files can store numbers, but Python reads them as strings."},{"Weight":0,"Text":"Python automatically converts all CSV values to floats","OptionFeedback":"Incorrect. Python does not auto-convert; all values arrive as strings."},{"Weight":0,"Text":"The csv module raises an error when it encounters numbers","OptionFeedback":"Incorrect. The csv module reads numbers without error but treats them as strings."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_018","Type":"MC","Title":"Recommended Script Structure for Data Analysis","QuestionText":"According to the module, what is the recommended high-level structure of a data analysis Python script?","Hint":"Think of the script as a pipeline with a clear beginning and end.","Feedback":"A well-organized data analysis script follows the structure: imports, data loading, processing, and output \u2014 functioning like a pipeline from raw data to summarized results.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108466-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Imports, data loading, processing, and output","OptionFeedback":"Correct! This four-stage structure makes scripts readable, maintainable, and easy to debug."},{"Weight":0,"Text":"Output, processing, data loading, and imports","OptionFeedback":"Incorrect. The order is reversed; imports and data loading must come before processing and output."},{"Weight":0,"Text":"Functions only, with no top-level code","OptionFeedback":"Incorrect. While functions are important, top-level code for imports and execution is also part of the structure."},{"Weight":0,"Text":"A single continuous block of code without any functions","OptionFeedback":"Incorrect. The module recommends using modular functions as a core best practice."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_019","Type":"MC","Title":"Use of f-strings for Output Formatting","QuestionText":"Which Python feature does the module recommend for producing polished, readable output in data analysis scripts?","Hint":"Think about a string formatting approach that embeds variable values directly inside the string.","Feedback":"The module recommends using f-strings (e.g., f\u0027Average Sales: {avg:.2f}\u0027) to produce formatted, readable output without requiring additional libraries.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108473-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"f-strings","OptionFeedback":"Correct! f-strings allow variable values to be embedded directly into strings with formatting control."},{"Weight":0,"Text":"The Matplotlib library","OptionFeedback":"Incorrect. Matplotlib is used for visualizations, not formatted text output."},{"Weight":0,"Text":"The csv module","OptionFeedback":"Incorrect. The csv module handles file reading and writing, not console output formatting."},{"Weight":0,"Text":"Docstrings","OptionFeedback":"Incorrect. Docstrings document functions; they are not used for runtime output formatting."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_020","Type":"MC","Title":"Variable Scope Inside Python Functions","QuestionText":"What happens to a variable that is created inside a Python function?","Hint":"Think about whether that variable is visible to code running outside the function.","Feedback":"Variables created inside a function are local to that function and are not accessible outside it, preventing unintended side effects in data scripts.","TopicTitle":"Setting Up the Analytics Environment","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:27:20.5108478-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It is local to the function and cannot be accessed outside it","OptionFeedback":"Correct! Local variables are confined to their function\u0027s scope."},{"Weight":0,"Text":"It is automatically available as a global variable","OptionFeedback":"Incorrect. Local variables do not become global unless explicitly declared with the global keyword."},{"Weight":0,"Text":"It persists between multiple calls to the same function","OptionFeedback":"Incorrect. Local variables are recreated on each function call and do not persist."},{"Weight":0,"Text":"It overwrites any global variable with the same name","OptionFeedback":"Incorrect. The local variable takes precedence inside the function but does not overwrite the global variable."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"}]};
