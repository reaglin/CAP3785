  <script>
  var QUIZ_DATA = {"ModuleFolderName":"Advanced_Excel_Functions","CourseName":"CAP3785 - Data Analytics and Visualization","LastModified":"2026-07-03T14:21:30.4220153-04:00","NextQuestionNumber":21,"Questions":[{"Id":"TEMP_001","Type":"MC","Title":"VLOOKUP leftmost column requirement","QuestionText":"In a VLOOKUP function, where must the lookup value always be found in the table array?","Hint":"Think about which column VLOOKUP is designed to search first.","Feedback":"VLOOKUP always searches for the lookup value in the leftmost (first) column of the specified table array and returns a value from a column to the right.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220021-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The leftmost column of the table array","OptionFeedback":""},{"Weight":0,"Text":"Any column within the table array","OptionFeedback":""},{"Weight":0,"Text":"The rightmost column of the table array","OptionFeedback":""},{"Weight":0,"Text":"The column specified by the column index number","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"VLOOKUP syntax third argument","QuestionText":"In the formula =VLOOKUP(A2, B2:D100, 3, FALSE), what does the number 3 represent?","Hint":"Consider what position the number refers to within the table range.","Feedback":"The third argument in VLOOKUP is the column index number, indicating which column of the specified range should be used to return the result \u2014 in this case, the 3rd column of B2:D100.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220028-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The column number in the range from which to return a value","OptionFeedback":""},{"Weight":0,"Text":"The row number from which to return a value","OptionFeedback":""},{"Weight":0,"Text":"The number of rows to search in the table","OptionFeedback":""},{"Weight":0,"Text":"The number of matching values to return","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"VLOOKUP common real-world use case","QuestionText":"Which of the following best describes a common real-world use case for VLOOKUP?","Hint":"Think about scenarios where two tables need to be connected using a shared identifier.","Feedback":"A common use case for VLOOKUP is matching customer IDs in a sales report to customer names or regions stored in a separate reference table, effectively merging datasets.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.422003-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Matching customer IDs in a sales report to a name or region in a reference table","OptionFeedback":""},{"Weight":0,"Text":"Calculating the average sales value for a specific region","OptionFeedback":""},{"Weight":0,"Text":"Counting the number of completed transactions in a column","OptionFeedback":""},{"Weight":0,"Text":"Grouping data by month using a PivotTable","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"INDEX-MATCH over VLOOKUP advantage","QuestionText":"Which of the following is a key advantage of INDEX-MATCH over VLOOKUP?","Hint":"Consider what happens to VLOOKUP when columns are inserted or removed.","Feedback":"INDEX-MATCH supports left-side lookups and is less prone to breaking when columns are added or removed, making it more robust and flexible than VLOOKUP for complex or evolving datasets.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220032-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It supports lookups where the return column is to the left of the lookup column","OptionFeedback":""},{"Weight":0,"Text":"It is faster to write for simple lookup tasks","OptionFeedback":""},{"Weight":0,"Text":"It requires only one function instead of two","OptionFeedback":""},{"Weight":0,"Text":"It always returns multiple matching results","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"MATCH function return value","QuestionText":"What does the MATCH function return when used in an INDEX-MATCH combination?","Hint":"Think about what \u0027position\u0027 means in the context of a list or range.","Feedback":"The MATCH function returns the relative position of a lookup value within a specified range, which INDEX then uses to retrieve the corresponding value.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220034-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The relative position of a value within a range","OptionFeedback":""},{"Weight":0,"Text":"The actual cell value at a specified position","OptionFeedback":""},{"Weight":0,"Text":"The column letter of the matching cell","OptionFeedback":""},{"Weight":0,"Text":"The number of cells that match the lookup value","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_006","Type":"MC","Title":"SUMIF function correct syntax","QuestionText":"Which of the following represents the correct syntax for the SUMIF function?","Hint":"SUMIF requires a range to evaluate, a condition, and the range to sum.","Feedback":"The correct SUMIF syntax is =SUMIF(range, criteria, sum_range), where \u0027range\u0027 is evaluated against the criteria, and \u0027sum_range\u0027 contains the values to be summed.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220037-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"=SUMIF(range, criteria, sum_range)","OptionFeedback":""},{"Weight":0,"Text":"=SUMIF(sum_range, range, criteria)","OptionFeedback":""},{"Weight":0,"Text":"=SUMIF(criteria, sum_range, range)","OptionFeedback":""},{"Weight":0,"Text":"=SUMIF(range, sum_range, criteria)","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_007","Type":"MC","Title":"SUMIF North region example","QuestionText":"What does the formula =SUMIF(B2:B100, \u0027North\u0027, C2:C100) calculate?","Hint":"Focus on which column is being evaluated and which column is being summed.","Feedback":"This formula sums all values in column C where the corresponding cell in column B equals \u0027North\u0027, effectively giving the total sales for the North region.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220039-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The total of all values in column C where column B equals \u0027North\u0027","OptionFeedback":""},{"Weight":0,"Text":"The count of all cells in column B that contain \u0027North\u0027","OptionFeedback":""},{"Weight":0,"Text":"The average of all values in column C where column B equals \u0027North\u0027","OptionFeedback":""},{"Weight":0,"Text":"The total of all values in column B where column C equals \u0027North\u0027","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_008","Type":"MC","Title":"COUNTIF function purpose","QuestionText":"What is the primary purpose of the COUNTIF function in Excel?","Hint":"Consider what \u0027count\u0027 means and the role of the \u0027IF\u0027 condition.","Feedback":"COUNTIF counts the number of cells within a specified range that satisfy a single criterion, enabling quick frequency analysis of specific values.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220045-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To count cells in a range that meet a single specified criterion","OptionFeedback":""},{"Weight":0,"Text":"To sum values in a range that meet a single specified criterion","OptionFeedback":""},{"Weight":0,"Text":"To calculate the average of cells that meet a specified criterion","OptionFeedback":""},{"Weight":0,"Text":"To return the position of the first cell meeting a criterion","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_009","Type":"MC","Title":"AVERAGEIF Q1 example result","QuestionText":"What does the formula =AVERAGEIF(A2:A50, \u0027Q1\u0027, B2:B50) return?","Hint":"AVERAGEIF calculates a mean \u2014 but only for rows that match the condition.","Feedback":"This formula calculates the arithmetic mean of all values in column B where the corresponding cell in column A equals \u0027Q1\u0027, providing a conditional average for the Q1 subset.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220046-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The mean of values in column B where column A equals \u0027Q1\u0027","OptionFeedback":""},{"Weight":0,"Text":"The total of values in column B where column A equals \u0027Q1\u0027","OptionFeedback":""},{"Weight":0,"Text":"The count of cells in column A that contain \u0027Q1\u0027","OptionFeedback":""},{"Weight":0,"Text":"The median of values in column B where column A equals \u0027Q1\u0027","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_010","Type":"MC","Title":"Dynamic criteria in conditional functions","QuestionText":"How can criteria in conditional aggregation functions be made dynamic and easier to update?","Hint":"Think about referencing something outside the formula itself.","Feedback":"Criteria can be referenced from a cell (e.g., E1) instead of being hardcoded as strings, making formulas dynamic and easier to update when the criteria value changes.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220079-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"By referencing the criteria from a cell rather than hardcoding it","OptionFeedback":""},{"Weight":0,"Text":"By using the INDIRECT function to convert criteria to a range","OptionFeedback":""},{"Weight":0,"Text":"By nesting the criteria inside a VLOOKUP formula","OptionFeedback":""},{"Weight":0,"Text":"By placing all criteria in a separate PivotTable","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_011","Type":"MC","Title":"STDEV.S versus STDEV.P usage","QuestionText":"When should STDEV.S be used instead of STDEV.P in Excel?","Hint":"Think about the difference between a sample and an entire population.","Feedback":"STDEV.S should be used when working with a sample drawn from a larger population, as it applies Bessel\u0027s correction (dividing by n-1). STDEV.P is used only when data represents the entire population.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220089-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"When the data is a sample drawn from a larger population","OptionFeedback":""},{"Weight":0,"Text":"When the data represents the entire population","OptionFeedback":""},{"Weight":0,"Text":"When the dataset contains fewer than 30 values","OptionFeedback":""},{"Weight":0,"Text":"When you want to calculate variance instead of standard deviation","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_012","Type":"MC","Title":"MEDIAN versus MEAN for skewed data","QuestionText":"According to the module, why is the median often more representative than the mean for skewed distributions?","Hint":"Consider what extreme values do to an average.","Feedback":"For skewed distributions, extreme values pull the mean away from the center of the data, whereas the median represents the actual middle value and is not affected by outliers.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220091-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Because the median is not affected by extreme values that skew the mean","OptionFeedback":""},{"Weight":0,"Text":"Because the median always equals the most frequently occurring value","OptionFeedback":""},{"Weight":0,"Text":"Because the median calculation includes Bessel\u0027s correction","OptionFeedback":""},{"Weight":0,"Text":"Because the median is easier to compute than the mean in Excel","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_013","Type":"MC","Title":"LARGE function third-largest value","QuestionText":"What does the formula =LARGE(E2:E100, 3) return?","Hint":"The second argument in LARGE specifies the rank position you want to retrieve.","Feedback":"=LARGE(E2:E100, 3) returns the third-largest value in the range E2:E100, making it useful for ranked analysis and identifying near-top values.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220092-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The third-largest value in the range E2:E100","OptionFeedback":""},{"Weight":0,"Text":"The third value from the top of the range E2:E100","OptionFeedback":""},{"Weight":0,"Text":"The largest value in the first three cells of E2:E100","OptionFeedback":""},{"Weight":0,"Text":"The value at the third row of the range E2:E100","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_014","Type":"MC","Title":"Variance relationship to standard deviation","QuestionText":"According to the module, what is the mathematical relationship between variance and standard deviation?","Hint":"Think about squaring or square-rooting one to get the other.","Feedback":"Variance is the square of the standard deviation. Therefore, standard deviation is the square root of variance. VAR.S and STDEV.S are related in this way.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220093-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Variance is the square of the standard deviation","OptionFeedback":""},{"Weight":0,"Text":"Standard deviation is the square of the variance","OptionFeedback":""},{"Weight":0,"Text":"Variance is the square root of the standard deviation","OptionFeedback":""},{"Weight":0,"Text":"Variance and standard deviation are equal for population data","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_015","Type":"MC","Title":"Mean vs median distribution skew","QuestionText":"According to the module, what does it indicate when a dataset\u0027s mean is greater than its median?","Hint":"Think about which direction the tail of the distribution extends.","Feedback":"When mean \u003E median, it typically indicates a right-skewed distribution, where a small number of high values pull the mean upward relative to the median.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220095-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The dataset is likely right-skewed","OptionFeedback":""},{"Weight":0,"Text":"The dataset is likely left-skewed","OptionFeedback":""},{"Weight":0,"Text":"The dataset is symmetrically distributed","OptionFeedback":""},{"Weight":0,"Text":"The dataset has no outliers","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_016","Type":"MC","Title":"PivotTable automatic data expansion","QuestionText":"What is a key benefit of converting raw data into a formal Excel Table before creating a PivotTable?","Hint":"Consider what happens when new data rows or columns are added.","Feedback":"Excel Tables automatically expand to include new rows and columns, keeping formulas and PivotTables up to date without requiring manual adjustment.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220097-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Excel Tables automatically expand to include new data, keeping PivotTables current","OptionFeedback":""},{"Weight":0,"Text":"Excel Tables prevent any accidental changes to the source data","OptionFeedback":""},{"Weight":0,"Text":"Excel Tables eliminate the need for conditional aggregation functions","OptionFeedback":""},{"Weight":0,"Text":"Excel Tables automatically apply VLOOKUP formulas to new rows","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_017","Type":"MC","Title":"Slicers primary use in dashboards","QuestionText":"According to the module, what is the primary purpose of slicers in Excel PivotTable dashboards?","Hint":"Think about how slicers allow users to interact with a report without editing it directly.","Feedback":"Slicers allow users to filter PivotTable summaries interactively without modifying the underlying data structure, making them especially useful in presentation settings for stakeholder exploration.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220098-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To enable interactive filtering of PivotTable summaries without altering the data","OptionFeedback":""},{"Weight":0,"Text":"To automatically refresh PivotTables when the workbook is opened","OptionFeedback":""},{"Weight":0,"Text":"To convert raw data ranges into formal Excel Tables","OptionFeedback":""},{"Weight":0,"Text":"To apply conditional formatting to PivotTable results","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_018","Type":"MC","Title":"Recommended analytical workflow order","QuestionText":"According to the module, which sequence correctly describes a structured analytical workflow on a real dataset?","Hint":"Think about the logical progression from raw data to insights.","Feedback":"The recommended workflow is: clean raw data first, then use lookup functions to enrich it, followed by conditional aggregations for summary metrics, and finally statistical functions to characterize distributions.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.42201-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Clean data \u2192 enrich with lookups \u2192 conditional aggregations \u2192 statistical functions","OptionFeedback":""},{"Weight":0,"Text":"Statistical functions \u2192 conditional aggregations \u2192 lookups \u2192 clean data","OptionFeedback":""},{"Weight":0,"Text":"Lookups \u2192 statistical functions \u2192 clean data \u2192 conditional aggregations","OptionFeedback":""},{"Weight":0,"Text":"Conditional aggregations \u2192 clean data \u2192 lookups \u2192 statistical functions","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_019","Type":"MC","Title":"COUNTA versus COUNT difference","QuestionText":"What is the key difference between COUNT and COUNTA in Excel?","Hint":"Consider what types of cell contents each function includes in its tally.","Feedback":"COUNT tallies only numeric entries, while COUNTA counts all non-empty cells regardless of content type, including text, numbers, and logical values.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220102-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"COUNT tallies only numeric entries; COUNTA counts all non-empty cells","OptionFeedback":""},{"Weight":0,"Text":"COUNT counts all non-empty cells; COUNTA tallies only numeric entries","OptionFeedback":""},{"Weight":0,"Text":"COUNT includes blank cells; COUNTA excludes blank cells","OptionFeedback":""},{"Weight":0,"Text":"COUNT and COUNTA return the same result for numeric-only datasets","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_020","Type":"MC","Title":"Customer prioritization using Excel functions","QuestionText":"According to the module, which combination of functions can identify that the top 10% of customers account for 60% of revenue?","Hint":"One function identifies a threshold value; the other sums based on a condition.","Feedback":"PERCENTILE can establish the revenue threshold for the top 10% of customers, and SUMIFS can then sum revenue for all customers above that threshold, together supporting a customer prioritization strategy.","TopicTitle":"Lookup Functions: VLOOKUP and INDEX-MATCH","ModuleStudentOutcomeIds":[],"GeneratedDate":"2026-07-03T14:21:30.4220103-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"PERCENTILE and SUMIFS","OptionFeedback":""},{"Weight":0,"Text":"MEDIAN and COUNTIF","OptionFeedback":""},{"Weight":0,"Text":"LARGE and AVERAGEIF","OptionFeedback":""},{"Weight":0,"Text":"STDEV and VLOOKUP","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"}]};
