  <script>
  var QUIZ_DATA = {"ModuleFolderName":"Data_Visualization_Principle","CourseName":"CAP3785 - Data Analytics and Visualization","LastModified":"2026-07-03T14:23:48.1281168-04:00","NextQuestionNumber":21,"Questions":[{"Id":"TEMP_001","Type":"MC","Title":"Purpose of data visualization","QuestionText":"What is the primary purpose of data visualization?","Hint":"Think about what visualization does to raw numbers and information.","Feedback":"Data visualization transforms raw numbers and information into visual formats that make patterns, trends, and insights easier to understand and communicate, bridging the gap between data and decision-making.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281067-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To transform raw data into visual formats that make patterns and insights easier to understand and communicate","OptionFeedback":""},{"Weight":0,"Text":"To replace the need for raw data entirely by summarizing it in charts","OptionFeedback":""},{"Weight":0,"Text":"To make data look more attractive for presentation purposes only","OptionFeedback":""},{"Weight":0,"Text":"To reduce the amount of data an analyst needs to collect","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"Best chart for trends over time","QuestionText":"Which chart type is best suited for displaying how a variable changes over an ordered sequence such as time?","Hint":"Think about the chart type that implies continuity between data points.","Feedback":"Line charts are the standard choice for showing how a continuous variable changes across an ordered sequence, most commonly time, because the line implies continuity between data points.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281073-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Line chart","OptionFeedback":""},{"Weight":0,"Text":"Pie chart","OptionFeedback":""},{"Weight":0,"Text":"Bar chart","OptionFeedback":""},{"Weight":0,"Text":"Scatter plot","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"Tufte\u0027s data-ink ratio concept","QuestionText":"Edward Tufte\u0027s concept of \u0027data-ink ratio\u0027 recommends which of the following approaches to chart design?","Hint":"Tufte\u0027s principle is about the relationship between ink used for data versus decorative elements.","Feedback":"Tufte\u0027s data-ink ratio principle recommends maximizing the proportion of ink used to display actual data and minimizing decorative or redundant elements in a visualization.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281075-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Maximize ink used for actual data and minimize decorative or redundant elements","OptionFeedback":""},{"Weight":0,"Text":"Use as many colors as possible to make the chart visually engaging","OptionFeedback":""},{"Weight":0,"Text":"Maximize the total amount of information displayed in every chart","OptionFeedback":""},{"Weight":0,"Text":"Balance data ink equally with decorative elements for aesthetic appeal","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Truncated y-axis misleading effect","QuestionText":"Why is truncating the y-axis of a bar chart so that it starts at a value other than zero considered misleading?","Hint":"Consider what happens visually to the differences between bars when the axis is cut short.","Feedback":"Starting the y-axis at a value other than zero exaggerates the visual differences between bars, making small differences appear far larger than they actually are relative to the true scale.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281076-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It exaggerates the visual differences between bars, distorting the perceived scale","OptionFeedback":""},{"Weight":0,"Text":"It makes the chart harder to read by removing important axis labels","OptionFeedback":""},{"Weight":0,"Text":"It causes the bars to overlap, making comparisons impossible","OptionFeedback":""},{"Weight":0,"Text":"It hides the total values associated with each category","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"Pie chart appropriate usage limit","QuestionText":"According to the module, pie charts should be limited to situations with no more than how many segments?","Hint":"Think about the specific number mentioned in relation to how many slices the human eye can accurately judge.","Feedback":"The module specifies that pie charts should be limited to situations with no more than five or six segments, because human eyes struggle to judge angular differences accurately when there are many slices.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281077-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Five or six segments","OptionFeedback":""},{"Weight":0,"Text":"Two or three segments","OptionFeedback":""},{"Weight":0,"Text":"Ten or more segments","OptionFeedback":""},{"Weight":0,"Text":"Seven to nine segments","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_006","Type":"MC","Title":"Scatter plot primary purpose","QuestionText":"What is the primary purpose of using a scatter plot?","Hint":"Scatter plots involve plotting two numeric variables against each other on x and y axes.","Feedback":"Scatter plots reveal correlations, clusters, or outliers by plotting two continuous numeric variables against each other on the x and y axes. They show association, not causation.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281082-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To reveal correlations, clusters, or outliers between two continuous numeric variables","OptionFeedback":""},{"Weight":0,"Text":"To compare discrete categories ranked against one another","OptionFeedback":""},{"Weight":0,"Text":"To show how individual parts contribute to a total whole","OptionFeedback":""},{"Weight":0,"Text":"To display how a single variable changes over time","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_007","Type":"MC","Title":"Four-category chart selection framework","QuestionText":"What are the four categories in the decision framework for selecting the appropriate chart type?","Hint":"The framework helps analysts narrow down chart choices based on the type of data relationship being communicated.","Feedback":"The four-category framework for chart selection is: comparison, composition, distribution, and relationship. This helps analysts quickly identify the most appropriate chart type for their dataset.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281084-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Comparison, composition, distribution, relationship","OptionFeedback":""},{"Weight":0,"Text":"Trend, ranking, proportion, frequency","OptionFeedback":""},{"Weight":0,"Text":"Bar, line, pie, scatter","OptionFeedback":""},{"Weight":0,"Text":"Accuracy, simplicity, clarity, design","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_008","Type":"MC","Title":"Visual hierarchy in chart design","QuestionText":"Which of the following best describes how visual hierarchy is achieved in chart design?","Hint":"Consider the tools designers use to direct the viewer\u0027s eye to the most important elements first.","Feedback":"Visual hierarchy is achieved through size, color contrast, placement, and typography. These tools guide the viewer\u0027s eye to the most important elements first before supporting details.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281086-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Through size, color contrast, placement, and typography","OptionFeedback":""},{"Weight":0,"Text":"By including as much data as possible in a single chart","OptionFeedback":""},{"Weight":0,"Text":"By using only one color throughout the entire visualization","OptionFeedback":""},{"Weight":0,"Text":"By placing legends at the top of every chart","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_009","Type":"MC","Title":"Highlight color technique purpose","QuestionText":"What is the recommended \u0027highlight color\u0027 technique for using color purposefully in charts?","Hint":"Think about the contrast between neutral tones and a single accent color.","Feedback":"The highlight color technique involves rendering most data series in neutral grays and using a single accent color to draw attention to the key data point or trend the audience needs to notice.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281088-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Render most data series in neutral grays and use one accent color for the key data point","OptionFeedback":""},{"Weight":0,"Text":"Use a different color for every data series to make all values equally visible","OptionFeedback":""},{"Weight":0,"Text":"Use bright colors for all data points to maximize viewer engagement","OptionFeedback":""},{"Weight":0,"Text":"Apply gradient color fills across the entire chart background","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_010","Type":"MC","Title":"Five-second rule for charts","QuestionText":"What does the \u0027five-second rule\u0027 test in data visualization?","Hint":"This rule is a practical test related to how quickly a viewer can understand a chart\u0027s message.","Feedback":"The five-second rule states that if a viewer cannot identify a chart\u0027s main message within five seconds, the design needs simplification. It is a test of chart clarity and readability.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.128109-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Whether a viewer can identify the chart\u0027s main message within five seconds","OptionFeedback":""},{"Weight":0,"Text":"Whether a chart can be built in Excel in under five seconds","OptionFeedback":""},{"Weight":0,"Text":"Whether the chart loads within five seconds in a browser","OptionFeedback":""},{"Weight":0,"Text":"Whether a chart contains fewer than five visual elements","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_011","Type":"MC","Title":"3D pie chart distortion issue","QuestionText":"Why are 3D pie charts considered misleading in data visualization?","Hint":"Think about what happens to slices at the front of a tilted 3D pie chart compared to slices at the back.","Feedback":"A 3D pie chart tilted toward the viewer makes front slices appear larger than their true percentage, directly misrepresenting the data and distorting perceived proportions.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281093-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Front slices appear larger than their true percentage due to the 3D tilt effect","OptionFeedback":""},{"Weight":0,"Text":"They make it impossible to label the slices with percentages","OptionFeedback":""},{"Weight":0,"Text":"They reduce the number of segments that can be displayed","OptionFeedback":""},{"Weight":0,"Text":"They require more data points than flat pie charts to function correctly","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_012","Type":"MC","Title":"Dual-axis chart misleading risk","QuestionText":"What is the primary risk associated with using dual-axis charts with different scales?","Hint":"Consider how two lines from unrelated datasets can appear visually when their scales are independently adjusted.","Feedback":"Dual-axis charts with different scales can make unrelated trends appear correlated or disguise the true relationship between variables, potentially implying a causal link that does not exist.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281096-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"They can make unrelated trends appear correlated by independently scaling each axis","OptionFeedback":""},{"Weight":0,"Text":"They always display one axis label incorrectly in Excel","OptionFeedback":""},{"Weight":0,"Text":"They prevent viewers from comparing more than two data series","OptionFeedback":""},{"Weight":0,"Text":"They automatically truncate the y-axis to a non-zero starting value","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_013","Type":"MC","Title":"Inserting a chart in Excel","QuestionText":"What is the recommended first step before inserting a chart in Excel?","Hint":"Think about what Excel needs to correctly map data to the chart axes.","Feedback":"Always select your data range before inserting a chart to ensure Excel correctly maps the data to the chart axes. This is done using the Insert tab.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281098-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Select the data range you want to visualize","OptionFeedback":""},{"Weight":0,"Text":"Choose a chart style from the Chart Design tab","OptionFeedback":""},{"Weight":0,"Text":"Open the Format pane by double-clicking the chart area","OptionFeedback":""},{"Weight":0,"Text":"Move the chart to a dedicated chart sheet","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_014","Type":"MC","Title":"Adjusting chart data range Excel","QuestionText":"Which Excel feature allows you to modify both the series data and horizontal axis labels for a chart after it has been inserted?","Hint":"This feature is accessible from the chart tools and gives full control over what the chart displays.","Feedback":"The \u0027Select Data\u0027 dialog box in Excel shows both the series data and the horizontal axis labels, giving the user full control over what the chart displays after insertion.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.12811-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The Select Data dialog box","OptionFeedback":""},{"Weight":0,"Text":"The Format Cells dialog box","OptionFeedback":""},{"Weight":0,"Text":"The Quick Layouts menu on the Chart Design tab","OptionFeedback":""},{"Weight":0,"Text":"The Insert Chart wizard","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_015","Type":"MC","Title":"Dynamically linking chart title","QuestionText":"How can a chart title in Excel be linked dynamically to a cell value so it updates automatically?","Hint":"Think about how cell references work in Excel formulas and how they can be applied to a chart title field.","Feedback":"A chart title can be linked dynamically to a cell value by typing an equals sign in the title field and referencing the desired cell, so the title updates automatically whenever the cell value changes.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281102-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Type an equals sign in the title field and reference the desired cell","OptionFeedback":""},{"Weight":0,"Text":"Use the Format pane to enter a VLOOKUP formula in the title field","OptionFeedback":""},{"Weight":0,"Text":"Select the chart and use the Name Box to link it to a cell","OptionFeedback":""},{"Weight":0,"Text":"Right-click the chart and choose \u0027Link Title to Cell\u0027 from the context menu","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_016","Type":"MC","Title":"Legend placement readability tip","QuestionText":"Where should a chart legend ideally be placed to improve readability and reduce eye movement?","Hint":"Think about how much eye movement is required when the legend is in a separate box versus near the data.","Feedback":"Placing the legend directly next to or within the data series it labels, rather than in a separate box, reduces the eye movement required to decode the chart and improves overall readability.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281104-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Directly next to or within the data series it labels","OptionFeedback":""},{"Weight":0,"Text":"In a separate box below the chart for easy reference","OptionFeedback":""},{"Weight":0,"Text":"Above the chart title to ensure it is seen first","OptionFeedback":""},{"Weight":0,"Text":"Outside the chart area in a separate text box on the worksheet","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_017","Type":"MC","Title":"Audience impact on visualization design","QuestionText":"How should the intended audience influence the design of a data visualization?","Hint":"Consider the difference between a data analyst and a general audience in terms of complexity and labeling.","Feedback":"A visualization intended for a data-savvy analyst may include more detail and complexity, while one designed for a general audience should prioritize simplicity and clear labeling to ensure the message is accessible.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281105-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Data-savvy audiences can handle more complexity; general audiences need simplicity and clear labeling","OptionFeedback":""},{"Weight":0,"Text":"All audiences should receive the same visualization to ensure consistency","OptionFeedback":""},{"Weight":0,"Text":"General audiences prefer more data and detail to form their own conclusions","OptionFeedback":""},{"Weight":0,"Text":"The audience has no impact on visualization design; only the data matters","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_018","Type":"MC","Title":"Cherry-picking data ranges risk","QuestionText":"What problem arises when a visualization shows only a convenient subset of available data, such as a specific short time window?","Hint":"Think about what is hidden from the audience when only a favorable period is shown.","Feedback":"Cherry-picking a convenient data range, such as showing only a three-month sales spike while omitting a preceding year of decline, misrepresents long-term trends and misleads the audience about overall performance.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281121-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It misrepresents long-term trends by omitting unfavorable data periods","OptionFeedback":""},{"Weight":0,"Text":"It makes the chart too complex for general audiences to interpret","OptionFeedback":""},{"Weight":0,"Text":"It causes Excel to miscalculate the axis scale automatically","OptionFeedback":""},{"Weight":0,"Text":"It forces the use of a pie chart instead of a bar chart","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_019","Type":"MC","Title":"Bar vs. horizontal bar chart usage","QuestionText":"When is it recommended to use a horizontal bar chart instead of a column chart?","Hint":"Think about situations where the category labels are very long or there are many categories.","Feedback":"A horizontal bar chart is recommended when category labels are long or when there are many categories to display, as it provides more space for readable labels along the vertical axis.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281123-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"When category labels are long or there are many categories to display","OptionFeedback":""},{"Weight":0,"Text":"When the data represents parts of a whole rather than discrete comparisons","OptionFeedback":""},{"Weight":0,"Text":"When the x-axis represents a continuous ordered time dimension","OptionFeedback":""},{"Weight":0,"Text":"When the dataset contains two continuous numeric variables","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_020","Type":"MC","Title":"Ethical obligation in visualization","QuestionText":"What ethical obligation do professionals have when constructing data visualizations?","Hint":"Consider the responsibility that comes with using charts to inform decisions or influence opinion.","Feedback":"Professionals in business, journalism, and science are expected to uphold standards of accuracy and transparency in how they present data visually, representing data honestly especially when visualizations inform decisions or influence opinion.","TopicTitle":"Foundations of Data Visualization","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:23:48.1281124-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To represent data honestly and uphold standards of accuracy and transparency","OptionFeedback":""},{"Weight":0,"Text":"To make visualizations as visually appealing as possible to maximize audience engagement","OptionFeedback":""},{"Weight":0,"Text":"To simplify all data to a single chart type for consistency across reports","OptionFeedback":""},{"Weight":0,"Text":"To include all available raw data in every visualization to avoid omission","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"}]};
