  <script>
  var QUIZ_DATA = {"ModuleFolderName":"Ethics_Data_Types","CourseName":"CAP3785 - Data Analytics and Visualization","LastModified":"2026-07-03T14:18:18.190346-04:00","NextQuestionNumber":21,"Questions":[{"Id":"TEMP_001","Type":"MC","Title":"Why Ethics Matters in Analytics","QuestionText":"Why is ethics considered essential in data analytics practice?","Hint":"Think about the kinds of decisions that are increasingly driven by data.","Feedback":"Ethics establishes the moral framework guiding data collection, analysis, and use. As data-driven decisions influence hiring, lending, healthcare, and criminal justice, unethical practice can have severe and far-reaching consequences.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903385-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It establishes the moral framework for how data is collected, analyzed, and used in decisions that affect people\u0027s lives.","OptionFeedback":""},{"Weight":0,"Text":"It primarily ensures that analytics projects are completed on time and within budget.","OptionFeedback":""},{"Weight":0,"Text":"It focuses exclusively on improving the technical accuracy of predictive models.","OptionFeedback":""},{"Weight":0,"Text":"It is only relevant when working with healthcare or financial data.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"Fairness in Hiring Algorithms","QuestionText":"A hiring algorithm trained on historically biased data may disadvantage certain candidates even when protected characteristics are not included as inputs. Which core ethical principle does this scenario most directly illustrate the importance of?","Hint":"Consider the principle that requires analytical models to treat all individuals and groups equitably.","Feedback":"Fairness requires that analytical models and data practices treat all individuals and groups equitably, avoiding discriminatory outcomes\u2014even when bias is embedded in the training data rather than explicitly programmed.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903389-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Fairness","OptionFeedback":""},{"Weight":0,"Text":"Transparency","OptionFeedback":""},{"Weight":0,"Text":"Accountability","OptionFeedback":""},{"Weight":0,"Text":"Data minimization","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"Transparency Supports Informed Consent","QuestionText":"According to the module, why is transparency especially critical when automated decisions affect rights or opportunities?","Hint":"Think about what transparency enables stakeholders to do with analytical findings.","Feedback":"Transparency supports informed consent and enables stakeholders to challenge or verify findings\u2014this is especially important when automated decisions affect individuals\u0027 rights or opportunities.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903391-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It enables stakeholders to challenge or verify findings and supports informed consent.","OptionFeedback":""},{"Weight":0,"Text":"It guarantees that all analytical models produce accurate results.","OptionFeedback":""},{"Weight":0,"Text":"It eliminates the need for third-party audits of data practices.","OptionFeedback":""},{"Weight":0,"Text":"It ensures that all personal data is anonymized before analysis.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Accountability Mechanisms in Analytics","QuestionText":"Which of the following is listed in the module as an accountability mechanism that helps ensure organizations can be held responsible for their data practices?","Hint":"Look at specific structures or processes mentioned under the accountability principle.","Feedback":"Accountability mechanisms include internal review boards, third-party audits, regulatory compliance requirements, and clear chains of responsibility within teams.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903393-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Third-party audits","OptionFeedback":""},{"Weight":0,"Text":"Data minimization policies","OptionFeedback":""},{"Weight":0,"Text":"Pseudonymization of datasets","OptionFeedback":""},{"Weight":0,"Text":"HTTP authentication for API access","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"Privacy Violations and Legal Penalties","QuestionText":"Which regulations are cited in the module as examples where privacy violations can result in legal penalties?","Hint":"Think about regulations that apply to the European Union and US healthcare data.","Feedback":"The module cites GDPR and HIPAA as examples of regulations under which privacy violations can result in legal penalties as well as significant reputational damage to organizations.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903394-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"GDPR and HIPAA","OptionFeedback":""},{"Weight":0,"Text":"CCPA and FERPA","OptionFeedback":""},{"Weight":0,"Text":"HIPAA and the Sarbanes-Oxley Act","OptionFeedback":""},{"Weight":0,"Text":"GDPR and the Data Science Oath","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_006","Type":"MC","Title":"Stages Where Bias Enters Analytics","QuestionText":"According to the module, at which stages of the analytics pipeline can bias enter?","Hint":"Consider whether bias is limited to a single phase or can occur throughout the process.","Feedback":"Bias can enter at any stage of the analytics pipeline\u2014from data collection and labeling to model selection and interpretation of results. A technically sound model can still produce biased outcomes if the underlying data is skewed.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903398-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"At any stage, from data collection and labeling to model selection and interpretation of results.","OptionFeedback":""},{"Weight":0,"Text":"Only during the data collection phase, before any modeling begins.","OptionFeedback":""},{"Weight":0,"Text":"Only during model selection, when algorithm choices introduce systematic errors.","OptionFeedback":""},{"Weight":0,"Text":"Only during interpretation, when analysts misread model outputs.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_007","Type":"MC","Title":"Informed Consent Best Practice","QuestionText":"According to the module, what constitutes meaningful consent for collecting user behavior data on a website?","Hint":"Think about what users must genuinely receive\u2014beyond buried terms in a lengthy privacy policy.","Feedback":"Meaningful consent requires a clear, plain-language explanation of what is being collected and why, along with a genuine choice to opt in or out\u2014not simply burying terms in a lengthy privacy policy.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.19034-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"A clear, plain-language explanation of what is collected and why, with a genuine opt-in or opt-out choice.","OptionFeedback":""},{"Weight":0,"Text":"Including a privacy policy page somewhere on the website that users can find if they look.","OptionFeedback":""},{"Weight":0,"Text":"Displaying a cookie banner that users must click to dismiss before accessing the site.","OptionFeedback":""},{"Weight":0,"Text":"Encrypting all collected data so that it cannot be accessed by unauthorized parties.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_008","Type":"MC","Title":"Anonymization vs. Pseudonymization","QuestionText":"What is the key difference between true anonymization and pseudonymization as described in the module?","Hint":"Consider which technique makes re-identification possible versus impossible.","Feedback":"True anonymization irreversibly removes identifying information so re-identification is not possible. Pseudonymization replaces direct identifiers with artificial codes, but re-identification remains possible with additional information, making it a weaker protection.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903402-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"True anonymization makes re-identification impossible, while pseudonymization still allows re-identification with additional information.","OptionFeedback":""},{"Weight":0,"Text":"Pseudonymization permanently removes all identifying information, while anonymization only masks it temporarily.","OptionFeedback":""},{"Weight":0,"Text":"They are functionally equivalent; both prevent re-identification under all circumstances.","OptionFeedback":""},{"Weight":0,"Text":"Anonymization applies only to healthcare data, while pseudonymization applies to financial data.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_009","Type":"MC","Title":"Data Minimization Principle Explained","QuestionText":"Which of the following best illustrates the principle of data minimization?","Hint":"Think about collecting only what is strictly necessary for the defined purpose.","Feedback":"Data minimization means collecting only the data strictly necessary for a defined and legitimate purpose. An analytics project measuring website engagement needs only session duration and page views\u2014not users\u0027 full names or home addresses.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903404-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"A website engagement project collects only session duration and page views rather than users\u0027 full names and home addresses.","OptionFeedback":""},{"Weight":0,"Text":"An organization encrypts all personal data it collects to prevent unauthorized access.","OptionFeedback":""},{"Weight":0,"Text":"A company retains all collected data indefinitely to enable future analytics projects.","OptionFeedback":""},{"Weight":0,"Text":"An analyst uses pseudonymization to replace user names with artificial codes before analysis.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_010","Type":"MC","Title":"Bias Metrics for Detecting Fairness Issues","QuestionText":"Which of the following fairness metrics are mentioned in the module as tools for detecting bias in datasets and models?","Hint":"Think about quantitative measures that examine outcomes across different demographic groups.","Feedback":"The module mentions demographic parity, equalized odds, and disparate impact ratios as fairness metrics that provide quantitative tools for surfacing bias that may not be visible through casual inspection.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903407-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Demographic parity, equalized odds, and disparate impact ratios","OptionFeedback":""},{"Weight":0,"Text":"Precision, recall, and F1 score","OptionFeedback":""},{"Weight":0,"Text":"Mean squared error, R-squared, and p-values","OptionFeedback":""},{"Weight":0,"Text":"Gini coefficient, entropy, and information gain","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_011","Type":"MC","Title":"Misrepresentation of Analytical Findings","QuestionText":"According to the module, which of the following is an example of misrepresentation of analytical findings?","Hint":"Consider situations where facts may be technically accurate but the overall impression is misleading.","Feedback":"Misrepresentation includes cherry-picking favorable data points, using misleading chart scales, or omitting context that would change the interpretation of results\u2014even when individual facts are technically accurate.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903414-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Omitting contextual information that would change how results are interpreted.","OptionFeedback":""},{"Weight":0,"Text":"Reporting all findings transparently even when they contradict the client\u0027s expectations.","OptionFeedback":""},{"Weight":0,"Text":"Using anonymized data to protect participant privacy during analysis.","OptionFeedback":""},{"Weight":0,"Text":"Applying multiple bias mitigation techniques before building a predictive model.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_012","Type":"MC","Title":"Ethical Frameworks in Data Practice","QuestionText":"Which ethical principles, borrowed from bioethics, are mentioned in the module as foundations for frameworks used in data decision-making?","Hint":"Think about principles related to doing good, doing no harm, justice, and autonomy.","Feedback":"The module cites beneficence (do good), non-maleficence (do no harm), justice, and autonomy as common principles drawn from bioethics and applied to data analytics ethical frameworks.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903416-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Beneficence, non-maleficence, justice, and autonomy","OptionFeedback":""},{"Weight":0,"Text":"Transparency, accountability, fairness, and privacy","OptionFeedback":""},{"Weight":0,"Text":"Consent, anonymization, minimization, and credibility","OptionFeedback":""},{"Weight":0,"Text":"Accuracy, completeness, consistency, and timeliness","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_013","Type":"MC","Title":"Defining Structured Data","QuestionText":"Which of the following best defines structured data as described in the module?","Hint":"Think about how structured data is organized and what tools are typically used with it.","Feedback":"Structured data is organized in a predefined, consistent format that makes it easy to store, search, and analyze using traditional database tools. Examples include spreadsheets, relational databases, and transaction records.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903417-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Data organized in a predefined, consistent format that is easy to store, search, and analyze using traditional database tools.","OptionFeedback":""},{"Weight":0,"Text":"Data stored in JSON or XML format that contains some organizational markers but lacks a rigid schema.","OptionFeedback":""},{"Weight":0,"Text":"Data collected from social media platforms and stored as text files for sentiment analysis.","OptionFeedback":""},{"Weight":0,"Text":"Any data that has been cleaned and preprocessed before being loaded into an analytics platform.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_014","Type":"MC","Title":"Examples of Unstructured Data","QuestionText":"According to the module, which of the following is an example of unstructured data?","Hint":"Think about data types that lack a predefined format or schema.","Feedback":"Unstructured data lacks a predefined format or schema. Examples include social media posts, emails, images, audio recordings, and video files\u2014representing the vast majority of data generated today.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903419-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Social media posts and audio recordings","OptionFeedback":""},{"Weight":0,"Text":"Relational database tables with defined fields","OptionFeedback":""},{"Weight":0,"Text":"Spreadsheets containing customer transaction records","OptionFeedback":""},{"Weight":0,"Text":"SQL query results exported to CSV format","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_015","Type":"MC","Title":"Semi-Structured Data Characteristics","QuestionText":"How does the module describe semi-structured data such as JSON or XML?","Hint":"Think about where semi-structured data falls between the two main data type categories.","Feedback":"Semi-structured data sits between structured and unstructured data, containing some organizational markers but not conforming to a rigid schema\u2014examples include JSON and XML formats.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.190342-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It contains some organizational markers but does not conform to a rigid schema.","OptionFeedback":""},{"Weight":0,"Text":"It is fully organized in predefined fields identical to structured data but stored in cloud systems.","OptionFeedback":""},{"Weight":0,"Text":"It is identical to unstructured data but has been partially cleaned by an analyst.","OptionFeedback":""},{"Weight":0,"Text":"It refers exclusively to data stored in NoSQL databases such as MongoDB.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_016","Type":"MC","Title":"Evaluating Data Source Quality Dimensions","QuestionText":"Which dimensions of data quality does the module say analysts should evaluate when assessing a data source?","Hint":"Think about multiple characteristics that together determine whether a source can be trusted for analysis.","Feedback":"The module identifies accuracy, completeness, consistency, timeliness, and granularity as key quality dimensions to evaluate, along with the reputation of the data publisher and the methodology used for data collection.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903422-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Accuracy, completeness, consistency, timeliness, and granularity","OptionFeedback":""},{"Weight":0,"Text":"Size, format, storage cost, and download speed","OptionFeedback":""},{"Weight":0,"Text":"Anonymization level, encryption standard, and regulatory compliance","OptionFeedback":""},{"Weight":0,"Text":"API availability, license type, and community rating on data repositories","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_017","Type":"MC","Title":"Open Data Repository Examples","QuestionText":"Which of the following are identified in the module as well-known open data repositories?","Hint":"Think about platforms that aggregate and curate datasets from multiple contributors.","Feedback":"The module identifies Kaggle Datasets, UCI Machine Learning Repository, Harvard Dataverse, and Zenodo as well-known open data repositories that aggregate and curate datasets from multiple contributors.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903424-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Kaggle Datasets, UCI Machine Learning Repository, Harvard Dataverse, and Zenodo","OptionFeedback":""},{"Weight":0,"Text":"Amazon Redshift, Google BigQuery, Snowflake, and Microsoft Azure","OptionFeedback":""},{"Weight":0,"Text":"Salesforce, SAP, PostgreSQL, and MySQL","OptionFeedback":""},{"Weight":0,"Text":"Alpha Vantage, Quandl, Postman, and BeautifulSoup","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_018","Type":"MC","Title":"Making API Requests: HTTP Methods","QuestionText":"According to the module, which HTTP methods are described as foundational for understanding how to interact with a web API?","Hint":"Think about the two HTTP methods explicitly named in the data collection methods topic.","Feedback":"The module states that understanding HTTP methods GET and POST is foundational for making API requests and interacting with web APIs.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903426-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"GET and POST","OptionFeedback":""},{"Weight":0,"Text":"PUT and DELETE","OptionFeedback":""},{"Weight":0,"Text":"FETCH and SEND","OptionFeedback":""},{"Weight":0,"Text":"QUERY and PUSH","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_019","Type":"MC","Title":"Web Scraping Legal Considerations","QuestionText":"Before performing web scraping to collect data, what does the module say analysts must always check?","Hint":"Think about the documents on a website that govern automated access and usage terms.","Feedback":"Analysts must always check a website\u0027s Terms of Service and robots.txt file before scraping to ensure compliance with the site\u0027s policies and legal requirements.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903427-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"The website\u0027s Terms of Service and robots.txt file","OptionFeedback":""},{"Weight":0,"Text":"The website\u0027s API documentation and authentication key requirements","OptionFeedback":""},{"Weight":0,"Text":"The website\u0027s data anonymization standards and GDPR compliance status","OptionFeedback":""},{"Weight":0,"Text":"The website\u0027s data format and whether it supports JSON or XML exports","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_020","Type":"MC","Title":"Building an Ethical Data Culture","QuestionText":"According to the module, what organizational structures support building an ethical data culture?","Hint":"Think about governance and oversight mechanisms mentioned at the organizational level.","Feedback":"The module states that building an ethical data culture requires establishing data governance committees, ethics review processes for high-impact projects, and ongoing training for data teams\u2014recognizing that responsible data use is not solely an individual obligation.","TopicTitle":"Ethical Foundations in Data Analytics","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-03T14:18:18.1903429-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Data governance committees, ethics review processes for high-impact projects, and ongoing training for data teams.","OptionFeedback":""},{"Weight":0,"Text":"Purchasing advanced analytics software and hiring more data scientists.","OptionFeedback":""},{"Weight":0,"Text":"Requiring all employees to sign non-disclosure agreements about data usage.","OptionFeedback":""},{"Weight":0,"Text":"Encrypting all datasets at rest and in transit to prevent unauthorized access.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"}]};
