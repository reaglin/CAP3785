003E 5]\u0060 returns all elements in the array that are greater than 5, without requiring an explicit loop.","TopicTitle":"Introduction to NumPy for Data Manipulation","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374452-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Returns all elements in the array that are greater than 5","OptionFeedback":""},{"Weight":0,"Text":"Deletes all elements in the array greater than 5","OptionFeedback":""},{"Weight":0,"Text":"Replaces all elements greater than 5 with the value 5","OptionFeedback":""},{"Weight":0,"Text":"Returns the index positions of elements greater than 5","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"Reshaping a 1D array example","QuestionText":"Using NumPy, how would you reshape a 1D array of 12 elements into a 3\u00D74 matrix?","Hint":"Think about the reshape method and the condition that must be satisfied for reshaping to work.","Feedback":"You can use arr.reshape(3, 4) to transform a 1D array of 12 elements into a 3\u00D74 matrix. The total number of elements must remain the same (3 \u00D7 4 = 12).","TopicTitle":"Introduction to NumPy for Data Manipulation","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374454-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"arr.reshape(3, 4)","OptionFeedback":""},{"Weight":0,"Text":"arr.resize(3, 4)","OptionFeedback":""},{"Weight":0,"Text":"arr.transform(3, 4)","OptionFeedback":""},{"Weight":0,"Text":"arr.convert(3, 4)","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplay aFrames","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374485-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"NumPy","OptionFeedback":"Correct! Pandas is built on top of NumPy, extending its capabilities for data manipulation."},{"Weight":0,"Text":"Matplotlib","OptionFeedback":"Incorrect. Matplotlib is a plotting library, not the foundation of Pandas."},{"Weight":0,"Text":"SciPy","OptionFeedback":"Incorrect. SciPy is a scientific computing library and is not the base on which Pandas is built."},{"Weight":0,"Text":"Scikit-learn","OptionFeedback":"Incorrect. Scikit-learn is a machine learning library and is not the foundation of Pandas."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"How to create a DataFrame from a dictionary?","QuestionText":"Which code example correctly creates a Pandas DataFrame from a dictionary?","Hint":"The example in the content uses two keys: \u0027Name\u0027 and \u0027Age\u0027.","Feedback":"pd.DataFrame({\u0027Name\u0027: [\u0027Alice\u0027, \u0027Bob\u0027], \u0027Age\u0027: [25, 30]}) is the example provided in the content for creating a DataFrame from a dictionary.","TopicTitle":"Getting Started with Pandas DataFrames","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374488-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"pd.DataFrame({\u0027Name\u0027: [\u0027Alice\u0027, \u0027Bob\u0027], \u0027Age\u0027: [25, 30]})","OptionFeedback":"Correct! This is the exact example from the content showing DataFrame creation from a dictionary."},{"Weight":0,"Text":"pd.Series({\u0027Name\u0027: [\u0027Alice\u0027, \u0027Bob\u0027], \u0027Age\u0027: [25, 30]})","OptionFeedback":"Incorrect. pd.Series is used to create a one-dimensional structure, not a two-dimensional DataFrame."},{"Weight":0,"Text":"pd.DataFrame([\u0027Alice\u0027, \u0027Bob\u0027], [25, 30])","OptionFeedback":"Incorrect. Passing two separate lists without keys does not create the intended labeled DataFrame."},{"Weight":0,"Text":"pd.DataFrame(Name=[\u0027Alice\u0027, \u0027Bob\u0027], Age=[25, 30])","OptionFeedback":"Incorrect. DataFrame does not accept column names as keyword arguments in this manner."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Three fundamental components of a DataFrame","QuestionText":"Which of the following correctly lists the three fundamental components of every Pandas DataFrame?","Hint":"Think about what labels rows, what labels columns, and what holds the actual data.","Feedback":"Every DataFrame has an index (row labels), columns (column labels), and the underlying data values as its three fundamental components.","TopicTitle":"Getting Started with Pandas DataFrames","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.13745-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Index, columns, and values","OptionFeedback":"Correct! These are the three fundamental components of a DataFrame as described in the content."},{"Weight":0,"Text":"Rows, cells, and headers","OptionFeedback":"Incorrect. While related concepts, the content specifically identifies index, columns, and values as the three components."},{"Weight":0,"Text":"Keys, arrays, and dtypes","OptionFeedback":"Incorrect. These are not the terms used to describe the fundamental components of a DataFrame."},{"Weight":0,"Text":"Series, index, and NumPy arrays","OptionFeedback":"Incorrect. Although DataFrames relate to Series and NumPy, the three fundamental components are index, columns, and values."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"Purpose of DataFrame inspection methods","QuestionText":"According to the content, why are built-in inspection methods important in a data analysis workflow?","Hint":"Consider what you need to know about a dataset before performing operations on it.","Feedback":"Inspection methods help identify data types, spot missing values early, and understand the overall distribution of data without manually scanning the entire dataset, making them an essential first step.","TopicTitle":"Getting Started with Pandas DataFrames","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.137451-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"They help identify data types, spot missing values, and understand data distribution","OptionFeedback":"Correct! The content states these are the key benefits of using Pandas inspection methods."},{"Weight":0,"Text":"They automatically clean and remove all missing values from the dataset","OptionFeedback":"Incorrect. Inspection methods summarize and reveal information; they do not automatically clean data."},{"Weight":0,"Text":"They convert a DataFrame into a NumPy array for faster computation","OptionFeedback":"Incorrect. Inspection methods are for exploring and summarizing data, not for converting structures."},{"Weight":0,"Text":"They create visualizations of the dataset for reporting purposes","OptionFeedback":"Incorrect. Visualization is handled by libraries like Matplotlib; inspection methods provide textual summaries."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_001","Type":"MC","Title":"What does loc accessor use for selection?","QuestionText":"Which of the following best describes how the loc accessor selects data in a Pandas DataFrame?","Hint":"Think about whether loc uses names/labels or integer positions.","Feedback":"The loc accessor uses explicit labels or index names to select rows and columns, making it intuitive for working with named data.","TopicTitle":"Indexing and Selecting Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374518-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It selects data by explicit row and column labels or index names.","OptionFeedback":"Correct! loc is label-based and uses named indexes or column labels."},{"Weight":0,"Text":"It selects data purely by integer position.","OptionFeedback":"Incorrect. Selecting by integer position is the behavior of iloc, not loc."},{"Weight":0,"Text":"It selects data based on Boolean conditions only.","OptionFeedback":"Incorrect. Boolean/conditional filtering uses bracket notation with conditions, not loc exclusively."},{"Weight":0,"Text":"It selects only single columns using dot notation.","OptionFeedback":"Incorrect. Dot notation is a simpler shortcut for single columns and is separate from loc."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"iloc selects data using what method?","QuestionText":"How does the iloc accessor select data from a Pandas DataFrame?","Hint":"Consider how standard Python list indexing works.","Feedback":"iloc selects data purely by integer position, similar to standard Python list or NumPy array indexing, regardless of label names.","TopicTitle":"Indexing and Selecting Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374523-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"By integer position, similar to Python list indexing.","OptionFeedback":"Correct! iloc uses zero-based integer positions to select rows and columns."},{"Weight":0,"Text":"By explicit row and column label names.","OptionFeedback":"Incorrect. Using label names is the behavior of loc, not iloc."},{"Weight":0,"Text":"By applying logical conditions to column values.","OptionFeedback":"Incorrect. Logical conditions are used in conditional (Boolean) filtering, not iloc."},{"Weight":0,"Text":"By resetting the DataFrame index before selection.","OptionFeedback":"Incorrect. Resetting the index is a separate operation unrelated to iloc\u0027s selection method."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"Combining conditions in Boolean filtering","QuestionText":"When using conditional filtering in Pandas, which operators are used to combine multiple conditions?","Hint":"Think about the symbols used for logical AND and OR in Python bitwise operations.","Feedback":"Multiple conditions in Pandas Boolean filtering are combined using \u0026 for AND and | for OR, not the standard Python \u0027and\u0027/\u0027or\u0027 keywords.","TopicTitle":"Indexing and Selecting Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374529-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"\u0026 for AND and | for OR","OptionFeedback":"Correct! Pandas uses \u0026 and | to combine multiple Boolean conditions in filtering."},{"Weight":0,"Text":"\u0027and\u0027 and \u0027or\u0027 keywords","OptionFeedback":"Incorrect. Using \u0027and\u0027 and \u0027or\u0027 keywords does not work correctly with Pandas Boolean arrays; \u0026 and | must be used instead."},{"Weight":0,"Text":"\u002B for AND and - for OR","OptionFeedback":"Incorrect. The \u002B and - operators are arithmetic and are not used for combining Boolean conditions."},{"Weight":0,"Text":"\u0027\u0026\u0026\u0027 and \u0027||\u0027","OptionFeedback":"Incorrect. \u0027\u0026\u0026\u0027 and \u0027||\u0027 are not valid Python operators; Pandas uses \u0026 and | for combining conditions."}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Setting an index for label-based selection","QuestionText":"After executing df.set_index(\u0027StudentID\u0027), which of the following correctly retrieves the record for student \u0027S001\u0027?","Hint":"Think about what set_index changes and which accessor uses labels.","Feedback":"df.set_index(\u0027StudentID\u0027) makes StudentID the row index, so df.loc[\u0027S001\u0027] correctly retrieves that student\u0027s record using label-based indexing.","TopicTitle":"Indexing and Selecting Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374532-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"df.loc[\u0027S001\u0027]","OptionFeedback":"Correct! After setting StudentID as the index, loc uses the label \u0027S001\u0027 to retrieve the matching row."},{"Weight":0,"Text":"df.iloc[\u0027S001\u0027]","OptionFeedback":"Incorrect. iloc requires integer positions, not string labels like \u0027S001\u0027."},{"Weight":0,"Text":"df[\u0027S001\u0027]","OptionFeedback":"Incorrect. Simple bracket notation on a DataFrame is used for column selection, not row label retrieval."},{"Weight":0,"Text":"df[df[\u0027StudentID\u0027] == \u0027S001\  row index, compressing columns into rows and producing a hierarchical MultiIndex structure useful for multi-dimensional data.","TopicTitle":"Reshaping and Transforming Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374586-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It moves the innermost column level into the innermost row index, compressing columns into rows","OptionFeedback":""},{"Weight":0,"Text":"It expands row index levels into new columns, widening the DataFrame","OptionFeedback":""},{"Weight":0,"Text":"It aggregates all columns into a single summarized column","OptionFeedback":""},{"Weight":0,"Text":"It sorts the DataFrame by its column index in ascending order","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Pattern followed by groupby() operations","QuestionText":"Which pattern describes the sequence of operations performed by the pandas groupby() method?","Hint":"The pattern has three steps described with action words in the module.","Feedback":"The groupby() method follows a split-apply-combine pattern: the data is split into groups, a function is applied to each group, and the results are combined back into a single DataFrame.","TopicTitle":"Reshaping and Transforming Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374588-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Split-apply-combine: data is split into groups, a function is applied, and results are combined","OptionFeedback":""},{"Weight":0,"Text":"Filter-transform-load: data is filtered, transformed in place, and loaded into a new structure","OptionFeedback":""},{"Weig das methods are recommended for detecting missing values in a dataset?","Hint":"Think about a quick overview method and a column-by-column count method.","Feedback":"df.info() provides a quick overview of non-null counts per column, while df.isnull().sum() returns a column-by-column count of missing entries.","TopicTitle":"Handling Missing Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374592-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"df.info() and df.isnull().sum()","OptionFeedback":""},{"Weight":0,"Text":"df.describe() and df.isna().mean()","OptionFeedback":""},{"Weight":0,"Text":"df.head() and df.count()","OptionFeedback":""},{"Weight":0,"Text":"df.shape() and df.notnull().sum()","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"NaN versus None in Pandas","QuestionText":"What is a key difference between np.nan and None when used in Pandas?","Hint":"Consider the data types associated with each representation of missing data.","Feedback":"np.nan is a float, which can cause columns containing it to be cast to float dtype. None is a Python object and is treated as missing in object-type columns.","TopicTitle":"Handling Missing Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374594-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"np.nan is a float that may cast columns to float dtype; None is a Python object used in object-type columns.","OptionFeedback":""},{"Weight":0,"Text":"np.nan is an integer placeholder; None is a float used in numeric columns.","OptionFeedback":""},{"Weight":0,"Text":"np.nan and None are interchangeable and have identical effects on column dtypes.","OptionFeedback":""},{"Weight":0,"Text":"None causes columns to be cast to float dtype; np.nan is only used in object-type columns.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_003","Type":"MC","Title":"Risk of over-dropping missing data","QuestionText":"According to the module, what is a primary risk of using dropna() to remove missing values?","Hint":"Think about what happens to dataset size and potential bias when too many rows are removed.","Feedback":"Over-dropping with dropna() can significantly reduce dataset size and introduce bias, especially when data is not missing at random (MNAR).","TopicTitle":"Handling Missing Data","ModuleStudentOutcomeIds":[],"TopicIds":[],"GeneratedDate":"2026-07-05T17:03:47.1374599-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"It can reduce dataset size significantly and introduce bias if data is not missing at random.","OptionFeedback":""},{"Weight":0,"Text":"It permanently converts NaN values to zeros, distorting numeric calculations.","OptionFeedback":""},{"Weight":0,"Text":"It automatically fills missing values with column means, which may not be appropriate.","OptionFeedback":""},{"Weight":0,"Text":"It only removes columns, never rows, limiting its effectiveness.","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_004","Type":"MC","Title":"Common scalar fill values with fillna()","QuestionText":"Which of the following is listed in the module as a common scalar fill value when using fillna() for imputation?","Hint":"Consider standard statistical measures of central tendency mentioned in the notes.","Feedback":
